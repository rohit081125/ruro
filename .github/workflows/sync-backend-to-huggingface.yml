name: Sync backend to Hugging Face

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/sync-backend-to-huggingface.yml"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Hugging Face Hub
        run: python -m pip install --upgrade huggingface_hub

      - name: Upload backend folder to RURO Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          from huggingface_hub import HfApi

          api = HfApi()
          api.upload_folder(
              repo_id="rohit0811/ruro-backend",
              repo_type="space",
              folder_path="backend",
              path_in_repo=".",
              delete_patterns=["**/*"],
              ignore_patterns=[
                  "target/**",
                  "*.log",
              ],
          )
          PY
