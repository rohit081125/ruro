server.port=8080

spring.application.name=ruro-video-call
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ruro_video_call}
spring.data.mongodb.database=${MONGODB_DATABASE:ruro_video_call}

app.auth.jwt-secret=${JWT_SECRET:change-this-dev-secret-to-a-long-random-value-before-production}
app.auth.token-expiration-minutes=${JWT_EXPIRATION_MINUTES:1440}
app.auth.otp-expiration-minutes=${OTP_EXPIRATION_MINUTES:5}
app.auth.otp-resend-cooldown-seconds=${OTP_RESEND_COOLDOWN_SECONDS:60}
app.auth.otp-hourly-limit=${OTP_HOURLY_LIMIT:5}
app.security.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.email.sendgrid-api-key=${SENDGRID_API_KEY:}
app.email.sendgrid-from-email=${SENDGRID_FROM_EMAIL:}
app.email.sendgrid-from-name=${SENDGRID_FROM_NAME:RURO}
app.email.sendgrid-api-url=${SENDGRID_API_URL:https://api.sendgrid.com/v3/mail/send}

app.email.resend-api-key=${RESEND_API_KEY:}
app.email.resend-from-email=${RESEND_FROM_EMAIL:}
app.email.resend-api-url=${RESEND_API_URL:https://api.resend.com/emails}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
